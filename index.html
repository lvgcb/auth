<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Auth</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ── CONFIG: paste your keys here ── */
  :root {
    --supabase-url: '';
    --supabase-key: '';
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    color: #e8e4db;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(91,68,140,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(44,110,82,0.14) 0%, transparent 70%);
    pointer-events: none;
  }

  .grid-lines {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  /* ── CARD ── */
  .card {
    position: relative;
    width: 100%;
    max-width: 400px;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 2.5rem 2.25rem;
    backdrop-filter: blur(16px);
    animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #7c5cbf 0%, #3d8c6a 100%);
    border-radius: 10px;
    margin-bottom: 1.75rem;
    display: flex; align-items: center; justify-content: center;
  }
  .logo svg { width: 18px; height: 18px; fill: #fff; }

  h1 {
    font-size: 1.5rem;
    font-weight: normal;
    letter-spacing: -0.01em;
    color: #f0ece3;
    margin-bottom: 0.35rem;
  }
  .subtitle {
    font-size: 0.82rem;
    color: rgba(232,228,219,0.45);
    letter-spacing: 0.01em;
    margin-bottom: 2rem;
    font-family: 'Courier New', monospace;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 1.75rem;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 7px 0;
    font-size: 0.8rem;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.04em;
    color: rgba(232,228,219,0.5);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: none;
  }
  .tab.active {
    background: rgba(255,255,255,0.1);
    color: #f0ece3;
  }

  /* ── FORM ── */
  .form { display: flex; flex-direction: column; gap: 0.9rem; }

  label {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(232,228,219,0.5);
    font-family: 'Courier New', monospace;
    display: block;
    margin-bottom: 0.4rem;
  }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.9rem;
    color: #e8e4db;
    font-family: 'Courier New', monospace;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  input:focus {
    border-color: rgba(124,92,191,0.6);
    background: rgba(124,92,191,0.06);
  }
  input::placeholder { color: rgba(232,228,219,0.22); }

  .btn-primary {
    width: 100%;
    padding: 11px;
    background: linear-gradient(135deg, rgba(124,92,191,0.9) 0%, rgba(61,140,106,0.85) 100%);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 0.85rem;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 0.3rem;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.1rem 0;
    font-size: 0.72rem;
    color: rgba(232,228,219,0.25);
    font-family: 'Courier New', monospace;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: rgba(255,255,255,0.1);
  }

  .btn-google {
    width: 100%;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: #e8e4db;
    font-size: 0.82rem;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.03em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
  }
  .btn-google:hover {
    background: rgba(255,255,255,0.09);
    border-color: rgba(255,255,255,0.22);
    transform: translateY(-1px);
  }
  .btn-google svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: rgba(20,18,28,0.95);
    border: 0.5px solid rgba(255,255,255,0.14);
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 0.8rem;
    font-family: 'Courier New', monospace;
    color: #e8e4db;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    backdrop-filter: blur(10px);
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: rgba(220,80,80,0.5); color: #f5a0a0; }
  .toast.success { border-color: rgba(61,140,106,0.5); color: #85cba8; }

  /* ── DASHBOARD ── */
  .dashboard { animation: rise 0.4s cubic-bezier(0.22,1,0.36,1) both; }

  .user-badge {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 1.5rem;
  }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c5cbf, #3d8c6a);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-email {
    font-size: 0.82rem;
    font-family: 'Courier New', monospace;
    color: #e8e4db;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .user-label {
    font-size: 0.7rem;
    color: rgba(232,228,219,0.35);
    font-family: 'Courier New', monospace;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .welcome-text {
    font-size: 1.1rem;
    color: #f0ece3;
    margin-bottom: 0.4rem;
  }
  .welcome-sub {
    font-size: 0.78rem;
    color: rgba(232,228,219,0.4);
    font-family: 'Courier New', monospace;
    margin-bottom: 1.75rem;
  }
  .btn-signout {
    width: 100%;
    padding: 9px;
    background: transparent;
    border: 0.5px solid rgba(220,80,80,0.35);
    border-radius: 10px;
    color: rgba(245,160,160,0.8);
    font-size: 0.78rem;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-signout:hover {
    background: rgba(220,80,80,0.08);
    border-color: rgba(220,80,80,0.6);
    color: #f5a0a0;
  }

  .hidden { display: none !important; }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="grid-lines"></div>

<!-- ── AUTH CARD ── -->
<div class="card" id="auth-card">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <h1 id="card-title">Welcome back</h1>
  <p class="subtitle" id="card-subtitle">sign in to continue</p>

  <div class="tabs">
    <button class="tab active" id="tab-signin" onclick="switchTab('signin')">sign in</button>
    <button class="tab" id="tab-signup" onclick="switchTab('signup')">sign up</button>
  </div>

  <div class="form">
    <div>
      <label>email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div>
      <label>password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-primary" id="btn-submit" onclick="handleEmailAuth()">
      sign in
    </button>

    <div class="divider">or</div>

    <button class="btn-google" onclick="handleGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      continue with google
    </button>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div class="card dashboard hidden" id="dashboard">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
    </svg>
  </div>
  <p class="welcome-text">You're in.</p>
  <p class="welcome-sub">authenticated successfully</p>

  <div class="user-badge">
    <div class="avatar" id="avatar-initials">?</div>
    <div class="user-info">
      <div class="user-label">signed in as</div>
      <div class="user-email" id="user-email-display">—</div>
    </div>
  </div>

  <button class="btn-signout" onclick="handleSignOut()">sign out</button>
</div>

<div class="toast" id="toast"></div>

<script>
  /* ════════════════════════════════════════════
     CONFIG — replace with your Supabase values
  ════════════════════════════════════════════ */
  const SUPABASE_URL = 'https://wrnekveochmxwxtajjwz.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndybmVrdmVvY2hteHd4dGFqand6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNjYxMTgsImV4cCI6MjA5Mjc0MjExOH0.4eaQuxTpvQZSinPjbcK6qFgMbZDWuU828sRas2nsrSQ';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  /* ── state ── */
  let mode = 'signin';

  /* ── tab switch ── */
  function switchTab(t) {
    mode = t;
    document.getElementById('tab-signin').classList.toggle('active', t === 'signin');
    document.getElementById('tab-signup').classList.toggle('active', t === 'signup');
    document.getElementById('card-title').textContent = t === 'signin' ? 'Welcome back' : 'Create account';
    document.getElementById('card-subtitle').textContent = t === 'signin' ? 'sign in to continue' : 'get started today';
    document.getElementById('btn-submit').textContent = t === 'signin' ? 'sign in' : 'create account';
    document.getElementById('password').autocomplete = t === 'signin' ? 'current-password' : 'new-password';
  }

  /* ── toast ── */
  let toastTimer;
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
  }

  /* ── loading state ── */
  function setLoading(btn, on) {
    btn.disabled = on;
    if (on) {
      btn._orig = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span>';
    } else {
      btn.innerHTML = btn._orig || btn.innerHTML;
    }
  }

  /* ── show dashboard ── */
  function showDashboard(user) {
    document.getElementById('auth-card').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    const email = user.email || '';
    document.getElementById('user-email-display').textContent = email;
    document.getElementById('avatar-initials').textContent = email ? email[0].toUpperCase() : '?';
  }

  /* ── show auth ── */
  function showAuth() {
    document.getElementById('auth-card').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
  }

  /* ── email auth ── */
  async function handleEmailAuth() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-submit');

    if (!email || !password) { toast('fill in all fields', 'error'); return; }
    if (password.length < 6) { toast('password must be 6+ characters', 'error'); return; }

    setLoading(btn, true);
    try {
      let result;
      if (mode === 'signin') {
        result = await sb.auth.signInWithPassword({ email, password });
      } else {
        result = await sb.auth.signUp({ email, password });
        if (!result.error && result.data?.user && !result.data.session) {
          toast('check your email to confirm signup', 'success');
          setLoading(btn, false);
          return;
        }
      }
      if (result.error) throw result.error;
      toast('signed in', 'success');
    } catch (e) {
      toast(e.message || 'something went wrong', 'error');
      setLoading(btn, false);
    }
  }

  /* ── google oauth ── */
  async function handleGoogle() {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
    if (error) toast(error.message, 'error');
  }

  /* ── sign out ── */
  async function handleSignOut() {
    await sb.auth.signOut();
    showAuth();
    toast('signed out');
  }

  /* ── auth state listener ── */
  sb.auth.onAuthStateChange((_event, session) => {
    if (session?.user) {
      showDashboard(session.user);
    } else {
      showAuth();
    }
  });

  /* ── enter key ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('auth-card').classList.contains('hidden')) {
      handleEmailAuth();
    }
  });
</script>
</body>
</html>
